<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>farsights.ai</title>
  <meta name="description" content="farsights.ai" />
  <style>
    :root {
      --text: rgba(246, 246, 242, 0.84);
      --muted: rgba(246, 246, 242, 0.56);
      --faint: rgba(246, 246, 242, 0.34);
      --rule: rgba(246, 246, 242, 0.18);
      --blue: rgba(137, 158, 190, 0.82);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #343434;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.045), rgba(0,0,0,0.06) 44%, rgba(0,0,0,0.22) 100%),
        url("./farsights-landing-bg-mirrored-1920x1080.webp");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      padding: 48px;
      position: relative;
    }

    .mobile-brand {
      display: none;
    }

    .message {
      width: min(520px, calc(100vw - 48px));
      margin-top: -2vh;
      text-align: center;
      text-shadow: 0 2px 24px rgba(0,0,0,0.30);
    }

    .eyebrow,
    .headline,
    .launch {
      text-transform: lowercase;
      letter-spacing: 0.28em;
      font-weight: 400;
    }

    .eyebrow {
      font-size: 11px;
      color: var(--faint);
      margin-bottom: 22px;
    }

    .headline {
      margin: 0;
      font-size: clamp(18px, 2.1vw, 28px);
      line-height: 1.25;
      color: var(--text);
    }

    .divider {
      width: 64px;
      height: 1px;
      margin: 24px auto 20px;
      background: var(--rule);
    }

    .launch {
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      body {
        background-image:
          linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.06) 42%, rgba(0,0,0,0.28)),
          url("./farsights-landing-bg-mirrored-1920x1080.webp");
        background-size: auto 100%;
        background-position: 16% center;
        background-repeat: no-repeat;
      }

      .page {
        min-height: 100svh;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .mobile-brand {
        display: block;
        position: absolute;
        top: 42px;
        left: 24px;
        right: 24px;
        text-align: center;
        font-size: 32px;
        line-height: 1;
        letter-spacing: -0.045em;
        font-weight: 400;
        color: rgba(246,246,242,0.84);
        text-shadow: 0 2px 24px rgba(0,0,0,0.34);
      }

      .mobile-brand .dotai {
        color: var(--blue);
      }

      .message {
        width: min(350px, calc(100vw - 48px));
        margin-top: 10vh;
      }

      .eyebrow {
        font-size: 10px;
        letter-spacing: 0.24em;
        margin-bottom: 18px;
      }

      .headline {
        font-size: 16px;
        letter-spacing: 0.20em;
        line-height: 1.35;
      }

      .divider {
        width: 48px;
        margin: 20px auto 17px;
      }

      .launch {
        font-size: 10px;
        letter-spacing: 0.20em;
      }
    }

    @media (max-width: 390px) {
      .mobile-brand {
        font-size: 30px;
      }

      .headline {
        font-size: 15px;
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="mobile-brand">farsights<span class="dotai">.ai</span></div>

    <section class="message" aria-label="Farsights.ai launch message">
      <div class="eyebrow">stealth mode</div>
      <h1 class="headline">building quietly</h1>
      <div class="divider"></div>
      <div class="launch">q3 2026 launch</div>
    </section>
  </main>
</body>
</html>
