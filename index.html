<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>farsights.ai</title>
  <meta name="description" content="Farsights.ai is building quietly." />

  <style>
    :root {
      --text-primary: rgba(245, 247, 250, 0.92);
      --text-secondary: rgba(180, 199, 225, 0.82);
      --text-muted: rgba(180, 199, 225, 0.58);
      --shadow: 0 2px 18px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #151718;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-primary);

      background-image:
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.14),
          rgba(0, 0, 0, 0.04) 42%,
          rgba(0, 0, 0, 0.24)
        ),
        url("./farsights-landing-bg-mirrored-1920x1080.webp");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .stealth-card {
      max-width: 460px;
      padding: 0;
      text-shadow: var(--shadow);
    }

    .brand-mobile {
      display: none;
    }

    .eyebrow,
    .line,
    .date {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-weight: 300;
    }

    .eyebrow {
      margin-bottom: 18px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .line {
      margin-bottom: 14px;
      font-size: 15px;
      color: var(--text-primary);
    }

    .date {
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 720px) {
      body {
        min-height: 100svh;
        background-image:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.08),
            rgba(0, 0, 0, 0.02) 42%,
            rgba(0, 0, 0, 0.18)
          ),
          url("./farsights-landing-bg-mobile-1080x1920.png");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
      }

      .page {
        min-height: 100svh;
        padding: 28px 28px 76px;
        justify-content: flex-end;
        align-items: flex-start;
      }

      .brand-mobile {
        display: block;
        position: fixed;
        top: 54px;
        left: 28px;
        right: 28px;
        z-index: 2;
        text-align: right;
        pointer-events: none;
        text-shadow: var(--shadow);
      }

      .brand-name {
        margin: 0 0 8px;
        font-size: clamp(30px, 9vw, 44px);
        line-height: 1;
        font-weight: 300;
        letter-spacing: 0.16em;
        color: rgba(245, 247, 250, 0.9);
      }

      .brand-name .ai {
        color: rgba(143, 174, 219, 0.92);
      }

      .brand-tagline {
        margin: 0;
        font-size: clamp(9px, 2.4vw, 12px);
        line-height: 1.4;
        font-weight: 300;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(180, 199, 225, 0.78);
      }

      .stealth-card {
        max-width: 320px;
        z-index: 3;
      }

      .eyebrow {
        margin-bottom: 14px;
        font-size: 11px;
        color: rgba(180, 199, 225, 0.86);
      }

      .line {
        margin-bottom: 12px;
        font-size: 13px;
        color: rgba(245, 247, 250, 0.9);
      }

      .date {
        font-size: 10px;
        color: rgba(180, 199, 225, 0.7);
      }
    }

    @media (min-width: 721px) {
      .brand-mobile {
        display: none;
      }
    }

    @media (max-height: 680px) and (max-width: 720px) {
      .brand-mobile {
        top: 34px;
      }

      .page {
        padding-bottom: 42px;
      }

      .stealth-card {
        transform: scale(0.92);
        transform-origin: left bottom;
      }
    }
  </style>
</head>

<body>
  <main class="page" aria-label="Farsights stealth landing page">
    <div class="brand-mobile" aria-hidden="true">
      <p class="brand-name">farsights<span class="ai">.ai</span></p>
      <p class="brand-tagline">Clarity&nbsp;&nbsp;Advantage&nbsp;&nbsp;Insight</p>
    </div>

    <section class="stealth-card">
      <div class="eyebrow">Stealth mode</div>
      <div class="line">Building quietly</div>
      <div class="date">Q3 2026 launch</div>
    </section>
  </main>
</body>
</html>
