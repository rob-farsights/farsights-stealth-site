<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>farsights.ai</title>
  <meta name="description" content="farsights.ai — Q3 2026 launch" />
  <style>
    :root {
      --bg: #050506;
      --panel: #101114;
      --text: #f4f4f1;
      --muted: #a7a7a0;
      --line: rgba(255,255,255,.13);
      --glow: rgba(190,190,180,.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 70% 28%, rgba(160,160,150,.14), transparent 28%),
        radial-gradient(circle at 30% 72%, rgba(110,110,105,.12), transparent 34%),
        linear-gradient(135deg, #030304 0%, #090a0d 45%, #1a1a1c 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .frame {
      width: min(1120px, calc(100vw - 48px));
      min-height: min(680px, calc(100vh - 48px));
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
      box-shadow: 0 40px 120px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 5vw, 72px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .grid {
      position: absolute;
      inset: -20%;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 65% 45%, black, transparent 62%);
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .mark {
      position: absolute;
      right: clamp(28px, 8vw, 110px);
      top: clamp(54px, 10vw, 118px);
      width: min(380px, 38vw);
      aspect-ratio: 1;
      opacity: .9;
      filter: drop-shadow(0 0 55px var(--glow));
    }

    .tree {
      position: absolute;
      inset: 0;
    }

    .tree svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .tree .branch {
      fill: none;
      stroke: rgba(255,255,255,.28);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tree .branch-soft {
      stroke: rgba(255,255,255,.12);
      stroke-width: .9;
    }

    .tree .node {
      fill: rgba(245,245,235,.84);
    }

    .tree .node-soft {
      fill: rgba(245,245,235,.28);
    }

    .tree .halo {
      fill: none;
      stroke: rgba(255,255,255,.08);
      stroke-width: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 700px;
    }

    .eyebrow {
      color: var(--muted);
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 10vw, 132px);
      letter-spacing: -.075em;
      line-height: .88;
      font-weight: 600;
    }

    .dot {
      color: #d8d8cf;
    }

    footer {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .frame { min-height: calc(100vh - 32px); width: calc(100vw - 32px); }
      .mark { width: 280px; right: -70px; top: 105px; opacity: .48; }
      footer { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="farsights.ai placeholder">
    <div class="grid"></div>
    <div class="mark" aria-hidden="true">
      <div class="tree">
        <svg viewBox="0 0 420 420" role="img">
          <circle class="halo" cx="210" cy="210" r="164"></circle>
          <circle class="halo" cx="210" cy="210" r="112"></circle>

          <path class="branch" d="M210 342 C210 288 210 246 210 202"></path>
          <path class="branch" d="M210 245 C178 225 150 202 124 168"></path>
          <path class="branch" d="M210 245 C243 224 270 199 296 160"></path>
          <path class="branch" d="M210 202 C188 176 173 148 164 112"></path>
          <path class="branch" d="M210 202 C233 176 250 148 260 112"></path>

          <path class="branch branch-soft" d="M124 168 C96 152 77 132 60 104"></path>
          <path class="branch branch-soft" d="M124 168 C118 132 112 105 96 74"></path>
          <path class="branch branch-soft" d="M296 160 C323 143 342 121 360 92"></path>
          <path class="branch branch-soft" d="M296 160 C307 127 318 101 338 74"></path>
          <path class="branch branch-soft" d="M164 112 C141 92 126 72 116 46"></path>
          <path class="branch branch-soft" d="M260 112 C282 91 298 69 310 42"></path>

          <circle class="node" cx="210" cy="342" r="4"></circle>
          <circle class="node" cx="210" cy="245" r="5"></circle>
          <circle class="node" cx="210" cy="202" r="5"></circle>

          <circle class="node-soft" cx="124" cy="168" r="5"></circle>
          <circle class="node-soft" cx="296" cy="160" r="5"></circle>
          <circle class="node-soft" cx="164" cy="112" r="4"></circle>
          <circle class="node-soft" cx="260" cy="112" r="4"></circle>
          <circle class="node-soft" cx="60" cy="104" r="3.5"></circle>
          <circle class="node-soft" cx="96" cy="74" r="3.5"></circle>
          <circle class="node-soft" cx="360" cy="92" r="3.5"></circle>
          <circle class="node-soft" cx="338" cy="74" r="3.5"></circle>
          <circle class="node-soft" cx="116" cy="46" r="3.5"></circle>
          <circle class="node-soft" cx="310" cy="42" r="3.5"></circle>
        </svg>
      </div>
    </div>

    <section class="content">
      <div class="eyebrow">Stealth mode</div>
      <h1>farsights<span class="dot">.</span>ai</h1>
    </section>

    <footer>
      <div>Q3 2026 launch</div>
      <div>Building quietly</div>
    </footer>
  </main>
</body>
</html>
